name: Upload Python Package

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Create source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build pypi package
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: source_dist
          path: dist/*.tar.gz

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ffevaluation
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PUBLIC_PYPI_API_TOKEN }}
          skip-existing: true

  deploy-conda:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11"]

    defaults: # Needed for conda
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: acellera,conda-forge,defaults

      - name: Insert placeholder values
        run: |
          pip install toml pyyaml setuptools-scm
          python package/ffevaluation/insert_placeholder_values.py

      - name: Build conda package
        run: |
          conda install rattler-build -c conda-forge
          rattler-build build --recipe package/ffevaluation/recipe.yaml --output-dir /tmp/pkg/ --no-include-recipe -c acellera -c conda-forge

      - name: Upload to anaconda
        if: startsWith(github.ref, 'refs/tags')
        run: |
          conda install anaconda-client
          anaconda -t ${{ secrets.ANACONDA_TOKEN }} upload /tmp/pkg/noarch/ffevaluation-*.conda -u acellera
